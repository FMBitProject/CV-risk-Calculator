<title>Kalkulator Risiko ESC/EAS 2025</title>
<style>
:root {
  --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --color-background-primary: rgba(255, 255, 255, 0.7); 
  --color-border-tertiary: rgba(226, 232, 240, 0.8);
}

*{box-sizing:border-box;margin:0;padding:0}

body {
  font-family: var(--font-sans);
  padding: 24px 16px;
  min-height: 100vh;
  background-image: url('https://images.unsplash.com/photo-1559757175-5700dde675bc?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(15, 23, 42, 0.4); 
  z-index: -1;
}

.shell {
  max-width: 960px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
  background: rgba(255, 255, 255, 0.92); 
  backdrop-filter: blur(16px); 
  -webkit-backdrop-filter: blur(16px);
  padding: 24px;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  border: 1px solid rgba(255, 255, 255, 0.5);
}

.hdr{background: linear-gradient(135deg, #1e40af, #1e3a8a);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:12px; box-shadow: 0 4px 12px rgba(30, 64, 175, 0.2);}
.hdr-ico{width:44px;height:44px;background:rgba(255,255,255,.15);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.hdr-t{font-size:17px;font-weight:600;color:#fff}
.hdr-s{font-size:12px;color:rgba(255,255,255,.8);margin-top:2px}
